services:
  - type: web
    name: trading-bot-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APCA_API_KEY_ID
        sync: false
      - key: APCA_API_SECRET_KEY
        sync: false
      - key: APCA_BASE_URL
        value: https://paper-api.alpaca.markets
      - key: DASHBOARD_USER
        sync: false
      - key: DASHBOARD_PASS
        sync: false
